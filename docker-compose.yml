version: '3.8'

# ============================================================
# PLATEFORME SOC – docker-compose.yml
# Start : docker-compose up -d
#
# STACK :
#   • Shuffle SOAR   → http://localhost:3001
#   • Wazuh (single-node) → https://localhost:443
# ============================================================

services:

  # ──────────────────────────────────────────────
  # WAZUH ALL-IN-ONE (Manager + Indexer + Dashboard)
  # Image officielle single-node – tag stable 4.9.2
  # ──────────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.2
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword1
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh/rules:/var/ossec/etc/rules:ro
    networks:
      - soc-net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.2
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks:
      - soc-net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword1
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
    depends_on:
      - wazuh.indexer
    networks:
      - soc-net

  # ──────────────────────────────────────────────
  # SHUFFLE SOAR
  # → http://localhost:3001
  # ──────────────────────────────────────────────
  shuffle-opensearch:
    image: opensearchproject/opensearch:2.14.0
    hostname: shuffle-opensearch
    restart: always
    environment:
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
      - discovery.type=single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - shuffle-opensearch:/usr/share/opensearch/data
    networks:
      - soc-net

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    hostname: shuffle-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - SHUFFLE_OPENSEARCH_URL=http://shuffle-opensearch:9200
      - SHUFFLE_APP_HOTLOAD_FOLDER=/shuffle-apps
      - SHUFFLE_FILE_LOCATION=/files
      - HTTP_PROXY=
      - HTTPS_PROXY=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shuffle-apps:/shuffle-apps
      - shuffle-files:/files
    depends_on:
      - shuffle-opensearch
    networks:
      - soc-net

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    hostname: shuffle-frontend
    restart: always
    ports:
      - "3001:80"
      - "3443:443"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    depends_on:
      - shuffle-backend
    networks:
      - soc-net

  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:latest
    hostname: shuffle-orborus
    restart: always
    environment:
      - SHUFFLE_APP_SDK_VERSION=1.1.0
      - SHUFFLE_WORKER_VERSION=latest
      - ENVIRONMENT_NAME=Wazuh-SOC
      - BASE_URL=http://shuffle-backend:5001
      - SHUFFLE_ORBORUS_EXECUTION_TIMEOUT=120
      - SHUFFLE_BASE_IMAGE_NAME=ghcr.io/shuffle
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - shuffle-backend
    networks:
      - soc-net

# ──────────────────────────────────────────────
volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  shuffle-apps:
  shuffle-files:
  shuffle-opensearch:

networks:
  soc-net:
    driver: bridge
