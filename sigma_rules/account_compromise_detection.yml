title: Détection Compromission de Compte — Bruteforce Active Directory
id: f6a7b8c9-d0e1-2345-f012-456789012345
status: stable
description: |
  Détecte les tentatives de bruteforce sur Active Directory via l'Event ID 4625
  (échec d'authentification). Seuil configuré pour un SI assurantiel avec
  compte de service et authentification des courtiers externes.
author: KAMENI TCHOUATCHEU GAETAN BRUNEL — SOC Assurantiel v4.0
date: 2026/03/24
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1110.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625                        # An account failed to log on
    LogonType:
      - 3                                # Network logon
      - 10                               # RemoteInteractive (RDP)
  timeframe: 5m
  condition: selection | count() by TargetUserName > 5
falsepositives:
  - Utilisateurs ayant oublié leur mot de passe
  - Mauvaise configuration d'application utilisant des credentials obsolètes
level: medium
fields:
  - TargetUserName
  - IpAddress
  - WorkstationName
  - FailureReason
