title: Détection de Phishing — Portail Courtier Assurantiel
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: |
  Détecte des campagnes de Spear-Phishing ciblant les systèmes d'information
  d'un groupe assurantiel, notamment les accès au portail courtiers.
  Applicable sur les logs de passerelle email (Exchange, M365 Defender) et proxy web.
author: KAMENI TCHOUATCHEU GAETAN BRUNEL — SOC Assurantiel v4.0
date: 2026/03/24
modified: 2026/03/24
tags:
  - attack.initial_access
  - attack.t1566
  - attack.t1566.001
  - attack.t1566.002
  - tlp.amber
logsource:
  category: proxy
  product: windows
detection:
  selection_url:
    c-uri|contains:
      - '/portail-courtier/'
      - '/espace-client/'
      - '/sinistres/'
      - '/reset-password'
  selection_indicators:
    cs-referrer|contains:
      - 'bit.ly'
      - 'tinyurl'
      - 'rebrand.ly'
      - 'cutt.ly'
    cs-method: 'GET'
  filter_internal:
    c-ip|startswith:
      - '10.'
      - '192.168.'
      - '172.16.'
  condition: (selection_url and selection_indicators) and not filter_internal
falsepositives:
  - Campagnes marketing légitimes utilisant des raccourcisseurs d'URL
  - Tests de phishing internes autorisés
level: high
fields:
  - c-ip
  - c-uri
  - cs-referrer
  - cs-useragent
  - sc-status
---
title: Détection de Phishing — Analyse Pièce-Jointe Malveillante
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: |
  Détecte la réception d'emails avec pièces jointes potentiellement malveillantes
  sur les comptes métiers assurantiels (Finance, RH, Direction, IT).
author: KAMENI TCHOUATCHEU GAETAN BRUNEL — SOC Assurantiel v4.0
date: 2026/03/24
tags:
  - attack.initial_access
  - attack.t1566.001
logsource:
  product: m365defender
  service: EmailAttachmentInfo
detection:
  selection:
    FileType:
      - '.exe'
      - '.js'
      - '.vbs'
      - '.hta'
      - '.iso'
      - '.lnk'
      - '.docm'
      - '.xlsm'
  target_accounts:
    RecipientEmailAddress|endswith:
      - '@assurance-demo.fr'
  condition: selection and target_accounts
falsepositives:
  - Pièces jointes légitimes envoyées par des partenaires connus
level: high
